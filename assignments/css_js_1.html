<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Statement</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: left;
            max-width: 550px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            color: #333;
        }

        h2 {
            margin: 10px 0 20px;
            font-weight: 500;
            color: #666;
        }

        p {
            line-height: 1.7;
            color: #444;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            font-weight: 500;
            transition: 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hi, I'm Krithi Prakash</h1>
        <h2 id="role">Engineering Student | Aspiring Developer</h2>

        <p>
            I am a passionate engineering student interested in building real-world
            applications. My tech stack includes HTML, CSS, Java, and basic Python.
            I enjoy learning new technologies and solving problems creatively.
        </p>

        <a class="btn" href="https://krithip06.github.io/KrithiP.github.io-sem4-fet/">
            Back to Homepage
        </a>

        <br><br>

        <input type="text" id="roleInput" placeholder="Enter new role">
        <button class="btn" onclick="updateRole()">Update Role</button>
    </div>

    <script>
        function updateRole() {
            let role = document.getElementById("roleInput").value;

            if (role.trim() !== "") {
                document.getElementById("role").innerText = role;
                alert("Role updated successfully!");
            } else {
                alert("Please enter a role!");
            }
        }
    </script>

</body>
</html>
