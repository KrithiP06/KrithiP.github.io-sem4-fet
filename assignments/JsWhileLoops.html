<!DOCTYPE html>
<html>
<head>
    <title>Layer Switcher</title>

    <style>
        body {
            font-family: Arial;
            background-color: #eaeaea;
            padding: 30px;
        }

        button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
        }

       .box {
    width: 350px;
    height: 180px;
    border: 2px solid black;
    color: white;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    line-height: 180px;
    position: absolute;
}

#red {
    background-color: tomato;
    top: 180px;
    left: 120px;
    z-index: 1;
}

#blue {
    background-color: steelblue;
    top: 210px;
    left: 150px;
    z-index: 0;
}

#green {
    background-color: seagreen;
    top: 240px;
    left: 180px;
    z-index: -1;
}

        #output {
            margin-top: 550px;
            font-size: 22px;
        }
    </style>
</head>

<body>

    <h1>Simple Layer Switcher</h1>

    <button onclick="showRed()">Show Red</button>
    <button onclick="showBlue()">Show Blue</button>
    <button onclick="showGreen()">Show Green</button>
    <button onclick="autoSwitch()">Auto Switch</button>

    <br><br>

    <div id="red" class="box">RED LAYER</div>
    <div id="blue" class="box">BLUE LAYER</div>
    <div id="green" class="box">GREEN LAYER</div>

    <div id="output"></div>

    <script src="script.js"></script>

</body>
</html>
