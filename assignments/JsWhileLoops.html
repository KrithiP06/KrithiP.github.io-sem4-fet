<!DOCTYPE html>
<html>
<head>
    <title>Layer Switcher with Loops</title>

    <style>
        body {
            font-family: Arial;
            background-color: #eaeaea;
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .box {
            width: 350px;
            height: 180px;
            border: 2px solid black;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 180px;
            position: absolute;
        }

        #red {
            background-color: tomato;
            top: 180px;
            left: 120px;
            z-index: 1;
        }

        #blue {
            background-color: steelblue;
            top: 180px;
            left: 120px;
            z-index: 0;
        }

        #green {
            background-color: seagreen;
            top: 180px;
            left: 120px;
            z-index: -1;
        }

        #output {
            margin-top: 500px;
            font-size: 18px;
            background: white;
            padding: 10px;
            width: 300px;
            border: 1px solid black;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            font-size: 18px;
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

    <h1>Layer Switcher with Loops</h1>

    <button onclick="showRed()">Show Red</button>
    <button onclick="showBlue()">Show Blue</button>
    <button onclick="showGreen()">Show Green</button>
    <button onclick="autoSwitch()">Auto Switch</button>

    <br><br>

    <div id="red" class="box">RED LAYER</div>
    <div id="blue" class="box">BLUE LAYER</div>
    <div id="green" class="box">GREEN LAYER</div>

    <div id="output">
        Loop output will appear here
    </div>

    <a href="https://krithip06.github.io/KrithiP.github.io-sem4-fet/">
        Back to homepage
    </a>

    <script src="script.js"></script>

</body>
</html>
