<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Layer Changer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    .box {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      background: gray;
      border: 3px solid black;
      transition: 0.3s;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
      border: none;
      color: white;
      font-size: 16px;
    }

    .red-btn {
      background: red;
    }

    .blue-btn {
      background: blue;
    }

    .green-btn {
      background: green;
    }

    .yellow-btn {
      background: orange;
    }
  </style>
</head>
<body>

  <div class="box" id="colorBox"></div>

  <button class="red-btn" onclick="changeColor('red')">Red</button>
  <button class="blue-btn" onclick="changeColor('blue')">Blue</button>
  <button class="green-btn" onclick="changeColor('green')">Green</button>
  <button class="yellow-btn" onclick="changeColor('orange')">Yellow</button>

  <script>
    function changeColor(color) {
      document.getElementById("colorBox").style.background = color;
    }
  </script>

</body>
</html>
