<!DOCTYPE html>
<html>
<head>
    <title>Simple Layer Switcher</title>

    <style>
        body {
            font-family: Arial;
            background-color: #eaeaea;
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .layer {
            width: 350px;
            height: 180px;
            border: 2px solid black;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 180px;
            position: absolute;
        }

        #layer1 {
            background-color: crimson;
            top: 180px;
            left: 120px;
            z-index: 1;
        }

        #layer2 {
            background-color: royalblue;
            top: 210px;
            left: 150px;
            z-index: 0;
        }

        #layer3 {
            background-color: seagreen;
            top: 240px;
            left: 180px;
            z-index: -1;
        }

        .home-btn {
            margin-top: 500px;
            padding: 10px 18px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Simple Layer Switcher</h1>

    <button onclick="showLayer1()">Layer 1</button>
    <button onclick="showLayer2()">Layer 2</button>
    <button onclick="showLayer3()">Layer 3</button>

    <br><br>

    <div id="layer1" class="layer">
        LAYER 1
    </div>

    <div id="layer2" class="layer">
        LAYER 2
    </div>

    <div id="layer3" class="layer">
        LAYER 3
    </div>

    <script>
        function resetLayers() {
            document.getElementById("layer1").style.zIndex = "0";
            document.getElementById("layer2").style.zIndex = "0";
            document.getElementById("layer3").style.zIndex = "0";
        }

        function showLayer1() {
            resetLayers();
            document.getElementById("layer1").style.zIndex = "3";
        }

        function showLayer2() {
            resetLayers();
            document.getElementById("layer2").style.zIndex = "3";
        }

        function showLayer3() {
            resetLayers();
            document.getElementById("layer3").style.zIndex = "3";
        }
    </script>

    <a href="https://krithip06.github.io/KrithiP.github.io-sem4-fet/">
        <button class="home-btn">Back to Homepage</button>
    </a>

</body>
</html>
