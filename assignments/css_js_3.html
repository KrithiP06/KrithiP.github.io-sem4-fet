<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Me Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 380px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .gender-box,
        .skills-box {
            margin-bottom: 15px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        input[type="submit"] {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background: #0056b3;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .result-box {
            background: #e6f7ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .result-box p {
            margin: 8px 0;
            font-size: 18px;
        }

        .result-box b {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Contact Me</h2>

        <form id="contactForm">

            <label>Name:</label>
            <input type="text" id="name" required>

            <label>Email:</label>
            <input type="email" id="email" required>

            <label>Subject:</label>
            <select id="subject">
                <option>Job Opportunity</option>
                <option>Freelance Work</option>
                <option>Collaboration</option>
            </select>

            <div class="gender-box">
                <label><strong>Gender:</strong></label><br><br>

                <input type="radio" name="gender" value="Male" required>
                <label>Male</label>

                <input type="radio" name="gender" value="Female">
                <label>Female</label>
            </div>

            <div class="skills-box">
                <label><strong>Interested In:</strong></label><br><br>

                <input type="checkbox" value="Web Development"> Web Development<br>

                <input type="checkbox" value="App Development"> App Development<br>

                <input type="checkbox" value="UI/UX Design"> UI/UX Design
            </div>

            <label>Message:</label>
            <textarea rows="4" id="message" required></textarea>

            <input type="submit" value="Submit">

        </form>

        <div class="result-box" id="resultBox">
            <p><b>Name:</b> <span id="showName"></span></p>
            <p><b>Email:</b> <span id="showEmail"></span></p>
            <p><b>Subject:</b> <span id="showSubject"></span></p>
            <p><b>Gender:</b> <span id="showGender"></span></p>
            <p><b>Message:</b> <span id="showMessage"></span></p>
        </div>

        <a class="back-link"
            href="https://krithip06.github.io/KrithiP.github.io-sem4-fet/">
            Back to Homepage
        </a>

    </div>

    <script>

        const form = document.getElementById("contactForm");

        form.addEventListener("submit", function (event) {

            event.preventDefault();

            document.getElementById("showName").innerText =
                document.getElementById("name").value;

            document.getElementById("showEmail").innerText =
                document.getElementById("email").value;

            document.getElementById("showSubject").innerText =
                document.getElementById("subject").value;

            document.getElementById("showMessage").innerText =
                document.getElementById("message").value;

            let gender =
                document.querySelector('input[name="gender"]:checked').value;

            document.getElementById("showGender").innerText = gender;

            document.getElementById("resultBox").style.display = "block";

        });

    </script>

</body>

</html>
