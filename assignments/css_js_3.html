<!DOCTYPE html>
<html>
<head>
<title>Form</title>

<style>
body {font-family: Arial; background:#f2f2f2; padding:20px;}
.container {background:white; width:400px; margin:auto; padding:15px; border-radius:10px;}
input,select,textarea {width:100%; margin:5px 0; padding:6px;}
.btn {width:100%; padding:8px; margin-top:5px; cursor:pointer;}
#output {display:none; margin-top:15px; background:#e6f7ff; padding:10px;}
</style>

</head>

<body>

<div class="container">

<h2> Simple Forms</h2>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">

Gender:<br>

<label><input type="radio" name="g" value="Male"> Male</label><br>
<label><input type="radio" name="g" value="Female"> Female</label><br>

Hobbies:<br>

<label><input type="checkbox" value="Reading"> Reading</label><br>
<label><input type="checkbox" value="Sports"> Sports</label><br>
    
<select id="country">
    <option>India</option>
    <option>USA</option>
    <option>UK</option>
</select>

<textarea id="bio" rows="2" placeholder="Bio"></textarea>
<textarea id="feed" rows="3" placeholder="Feedback"></textarea>

<button class="btn" onclick="store()">Submit</button>
<button class="btn" onclick="show()">Display</button>

<div id="output"></div>

</div>

<script>

let data = {};

function store(){
    let gender="";
    document.getElementsByName("g").forEach(r=>{
        if(r.checked) gender=r.value;
    });

    let hobbies=[];
    document.querySelectorAll(".h").forEach(h=>{
        if(h.checked) hobbies.push(h.value);
    });

    data={
        name:document.getElementById("name").value,
        email:document.getElementById("email").value,
        gender:gender,
        hobbies:hobbies,
        country:document.getElementById("country").value,
        bio:document.getElementById("bio").value,
        feed:document.getElementById("feed").value
    };

    alert("Saved");
}

function show(){
    let o=document.getElementById("output");
    o.style.display="block";

    o.innerHTML=
    "<h3>Data</h3>"+
    "<div>Name: "+data.name+"</div>"+
    "<div>Email: "+data.email+"</div>"+
    "<div>Gender: "+data.gender+"</div>"+
    "<div>Hobbies: "+data.hobbies.join(", ")+"</div>"+
    "<div>Country: "+data.country+"</div>"+
    "<div>Bio: "+data.bio+"</div>"+
    "<div>Feedback: "+data.feed+"</div>";
}

</script>
<a class="btn" href="https://krithip06.github.io/KrithiP.github.io-sem4-fet/">
            Back to Homepage
        </a>
</body>
</html>
