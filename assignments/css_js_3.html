<!DOCTYPE html>
<html>

<head>
    <title>Contact Form</title>

    <style>
        body {
            font-family: Arial;
            background: #eaf7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: teal;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            background: #dff5ff;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: teal;
            font-size: 22px;
        }

        .gender {
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>Contact Form</h1>

        <input type="text" id="name" placeholder="Enter Name">

        <input type="email" id="email" placeholder="Enter Email">

        <select id="work">
            <option>Select Work Type</option>
            <option>Job Opportunity</option>
            <option>Freelance Work</option>
        </select>

        <textarea id="msg" rows="4" placeholder="Enter Message"></textarea>

        <div class="gender">
            <input type="radio" name="gender" value="Male"> Male

            <input type="radio" name="gender" value="Female"> Female
        </div>

        <button onclick="showData()">Submit</button>

        <div class="result" id="output"></div>

        <a href="https://krithip06.github.io/KrithiP.github.io-sem4-fet/">
            Go to Home Page
        </a>

    </div>

    <script>

        function showData() {

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let work = document.getElementById("work").value;
            let msg = document.getElementById("msg").value;

            let gender = document.querySelector('input[name="gender"]:checked');

            gender = gender ? gender.value : "Not Selected";

            document.getElementById("output").innerHTML =

                "<b>Name:</b> " + name + "<br>" +
                "<b>Email:</b> " + email + "<br>" +
                "<b>Work Type:</b> " + work + "<br>" +
                "<b>Message:</b> " + msg + "<br>" +
                "<b>Gender:</b> " + gender;
        }

    </script>

</body>

</html>
