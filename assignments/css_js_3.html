<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 420px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select, textarea {
            width: 100%;
            margin-top: 5px;
            margin-bottom: 10px;
            padding: 8px;
        }

        .btn {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            cursor: pointer;
        }

        .submit-btn {
            background: #4CAF50;
            color: white;
            border: none;
        }

        .display-btn {
            background: #2196F3;
            color: white;
            border: none;
        }

        .output {
            margin-top: 20px;
            background: #e6f7ff;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

<h2>User Form</h2>

<form>

    Name:
    <input type="text" id="name">

    Email:
    <input type="email" id="email">

    Gender:<br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <br><br>

    Hobbies:<br>
    <input type="checkbox" value="Reading" class="hobby"> Reading
    <input type="checkbox" value="Sports" class="hobby"> Sports
    <input type="checkbox" value="Music" class="hobby"> Music
    <br><br>

    Country:
    <select id="country">
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
    </select>

    Short Bio:
    <textarea id="bio" rows="2"></textarea>

    Feedback:
    <textarea id="feedback" rows="4"></textarea>

    <button type="button" class="btn submit-btn" onclick="storeData()">
        Submit
    </button>

    <button type="button" class="btn display-btn" onclick="displayData()">
        Display Result
    </button>

</form>

<div class="output" id="outputBox"></div>

</div>

<script>

let formData = {};
function storeData() {

    let gender = "";
    let hobbies = [];

    let genders = document.getElementsByName("gender");
    for (let g of genders) {
        if (g.checked) gender = g.value;
    }

    let hobbyList = document.getElementsByClassName("hobby");
    for (let h of hobbyList) {
        if (h.checked) hobbies.push(h.value);
    }

    formData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        gender: gender,
        hobbies: hobbies,
        country: document.getElementById("country").value,
        bio: document.getElementById("bio").value,
        feedback: document.getElementById("feedback").value
    };

    alert("Data stored successfully!");
}

function displayData() {

    let output = document.getElementById("outputBox");

    output.innerHTML =
        "<h3>Submitted Data</h3>" +
        "<p><b>Name:</b> " + formData.name + "</p>" +
        "<p><b>Email:</b> " + formData.email + "</p>" +
        "<p><b>Gender:</b> " + formData.gender + "</p>" +
        "<p><b>Hobbies:</b> " + formData.hobbies.join(", ") + "</p>" +
        "<p><b>Country:</b> " + formData.country + "</p>" +
        "<p><b>Short Bio:</b> " + formData.bio + "</p>" +
        "<p><b>Feedback:</b> " + formData.feedback + "</p>";

    output.style.display = "block";
}

</script>

</body>
</html>
