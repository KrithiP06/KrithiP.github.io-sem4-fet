<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Professional Interactive Form</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    padding:30px;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.2);
    padding:35px;
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
    color:white;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:30px;
    font-weight:700;
    letter-spacing:1px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:500;
}

input,
select,
textarea{
    width:100%;
    padding:12px 15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:14px;
    transition:0.3s ease;
}

input::placeholder,
textarea::placeholder{
    color:#dbeafe;
}

input:focus,
select:focus,
textarea:focus{
    background:rgba(255,255,255,0.22);
    transform:scale(1.02);
    box-shadow:0 0 12px rgba(255,255,255,0.35);
}

.radio-group,
.check-group{
    display:flex;
    gap:20px;
    margin-top:8px;
}

.radio-group label,
.check-group label{
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
}

input[type="radio"],
input[type="checkbox"]{
    width:auto;
    accent-color:#60a5fa;
}

.btn-group{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#3b82f6,#60a5fa);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
    text-decoration:none;
    text-align:center;
}

.btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 8px 20px rgba(96,165,250,0.4);
}

#output{
    display:none;
    margin-top:25px;
    padding:20px;
    border-radius:18px;
    background:rgba(255,255,255,0.12);
    animation:slideUp 0.5s ease;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

#output h3{
    margin-bottom:15px;
    text-align:center;
    color:#bfdbfe;
}

.data-item{
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
}

.data-item span{
    font-weight:600;
    color:#93c5fd;
}

.footer-btn{
    margin-top:18px;
}

</style>
</head>

<body>

<div class="container">

    <h2>Interactive User Form</h2>

    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
        <label>Gender</label>

        <div class="radio-group">
            <label>
                <input type="radio" name="g" value="Male"> Male
            </label>

            <label>
                <input type="radio" name="g" value="Female"> Female
            </label>
        </div>
    </div>

    <div class="input-group">
        <label>Hobbies</label>

        <div class="check-group">
            <label>
                <input type="checkbox" class="h" value="Reading"> Reading
            </label>

            <label>
                <input type="checkbox" class="h" value="Sports"> Sports
            </label>

            <label>
                <input type="checkbox" class="h" value="Music"> Music
            </label>
        </div>
    </div>

    <div class="input-group">
        <label>Country</label>

        <select id="country">
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option>
            <option>Australia</option>
        </select>
    </div>

    <div class="input-group">
        <label>Short Bio</label>
        <textarea id="bio" rows="3" placeholder="Tell us about yourself"></textarea>
    </div>

    <div class="input-group">
        <label>Feedback</label>
        <textarea id="feed" rows="4" placeholder="Write your feedback"></textarea>
    </div>

    <div class="btn-group">
        <button class="btn" onclick="store()">Submit</button>
        <button class="btn" onclick="show()">Display</button>
    </div>

    <div id="output"></div>

    <div class="footer-btn">
        <a class="btn" href="https://krithip06.github.io/KrithiP.github.io-sem4-fet/">
            Back to Homepage
        </a>
    </div>

</div>

<script>

let data = {};

function store(){

    let gender = "";

    document.getElementsByName("g").forEach(r => {
        if(r.checked){
            gender = r.value;
        }
    });

    let hobbies = [];

    document.querySelectorAll(".h").forEach(h => {
        if(h.checked){
            hobbies.push(h.value);
        }
    });

    data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        gender: gender,
        hobbies: hobbies,
        country: document.getElementById("country").value,
        bio: document.getElementById("bio").value,
        feed: document.getElementById("feed").value
    };

    if(data.name === "" || data.email === ""){
        alert("Please fill all required fields!");
        return;
    }

    alert("Form Submitted Successfully!");
}

function show(){

    let o = document.getElementById("output");

    o.style.display = "block";

    o.innerHTML = `
        <h3>User Information</h3>

        <div class="data-item">
            <span>Name:</span> ${data.name}
        </div>

        <div class="data-item">
            <span>Email:</span> ${data.email}
        </div>

        <div class="data-item">
            <span>Gender:</span> ${data.gender}
        </div>

        <div class="data-item">
            <span>Hobbies:</span> ${data.hobbies.join(", ")}
        </div>

        <div class="data-item">
            <span>Country:</span> ${data.country}
        </div>

        <div class="data-item">
            <span>Bio:</span> ${data.bio}
        </div>

        <div class="data-item">
            <span>Feedback:</span> ${data.feed}
        </div>
    `;
}

</script>

</body>
</html>
